<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velesync | Premium IoT Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
    <style>
        :root {
            --bg: #0B0E14; /* Deep Obsidian */
            --panel: rgba(255, 255, 255, 0.03);
            --accent: #2E5BFF; /* Electric Cobalt */
            --accent-glow: rgba(46, 91, 255, 0.5);
            --text: #F8FAFC;
            --text-muted: #64748B;
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #06B6D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(46, 91, 255, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(6, 182, 212, 0.08) 0%, transparent 45%);
        }

        .navbar {
            padding: 1.25rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 14, 20, 0.8);
        }

        .logo {
            font-weight: 800;
            font-size: 1.75rem;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #2E5BFF, #06B6D4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: '';
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 3px;
            transform: rotate(45deg);
        }

        .container {
            max-width: 1300px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(46, 91, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2.75rem;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            letter-spacing: -0.02em;
        }

        .unit {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .chart-container {
            grid-column: 1 / -1;
            height: 450px;
            padding: 2.5rem;
        }

        .badge {
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(46, 91, 255, 0.1);
            border: 1px solid rgba(46, 91, 255, 0.2);
            color: #7DD3FC;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { transform: scale(1.4); opacity: 0.5; box-shadow: 0 0 0 10px transparent; }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 transparent; }
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; margin-top: 1.5rem; }
            .navbar { padding: 1rem; }
            .grid { gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Velesync</div>
        <div class="badge">
            <span class="pulse"></span>
            VEL-OS ACTIVE
        </div>
    </nav>

    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="stat-label">Core Temperature</div>
                <div class="stat-value" id="temp-val">-- <span class="unit">°C</span></div>
            </div>
            <div class="card">
                <div class="stat-label">System Humidity</div>
                <div class="stat-value" id="humi-val">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="stat-label">Luminous Flux</div>
                <div class="stat-value" id="light-val">-- <span class="unit">lx</span></div>
            </div>
        </div>

        <div class="card chart-container">
            <div class="stat-label">Neural Data Stream</div>
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <script>
        const chartCtx = document.getElementById('liveChart').getContext('2d');
        
        const gradient1 = chartCtx.createLinearGradient(0, 0, 0, 400);
        gradient1.addColorStop(0, 'rgba(46, 91, 255, 0.3)');
        gradient1.addColorStop(1, 'rgba(46, 91, 255, 0)');

        const gradient2 = chartCtx.createLinearGradient(0, 0, 0, 400);
        gradient2.addColorStop(0, 'rgba(6, 182, 212, 0.3)');
        gradient2.addColorStop(1, 'rgba(6, 182, 212, 0)');

        const liveChart = new Chart(chartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Temperature',
                        borderColor: '#2E5BFF',
                        borderWidth: 4,
                        pointRadius: 0,
                        tension: 0.5,
                        fill: true,
                        backgroundColor: gradient1,
                        data: []
                    },
                    {
                        label: 'Humidity',
                        borderColor: '#06B6D4',
                        borderWidth: 4,
                        pointRadius: 0,
                        tension: 0.5,
                        fill: true,
                        backgroundColor: gradient2,
                        data: []
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.03)' }, 
                        ticks: { color: '#64748B', font: { family: 'Outfit', weight: 600 } } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { color: '#64748B', font: { family: 'Outfit', weight: 600 } } 
                    }
                },
                plugins: {
                    legend: { 
                        display: true,
                        position: 'top',
                        align: 'end',
                        labels: {
                            color: '#F8FAFC',
                            font: { family: 'Outfit', weight: 600 },
                            usePointStyle: true,
                            boxWidth: 8
                        }
                    }
                },
                interaction: {
                    intersect: false,
                    mode: 'index',
                }
            }
        });

        async function updateDashboard() {
            try {
                const res = await fetch('http://localhost:8000/api/history?limit=30');
                const data = await res.json();
                
                if (data.length > 0) {
                    const latest = data[0];
                    document.getElementById('temp-val').innerHTML = `${latest.temperature} <span class="unit">°C</span>`;
                    document.getElementById('humi-val').innerHTML = `${latest.humidity} <span class="unit">%</span>`;
                    document.getElementById('light-val').innerHTML = `${latest.light} <span class="unit">lx</span>`;

                    // Update Chart
                    const reversed = [...data].reverse();
                    liveChart.data.labels = reversed.map(d => new Date(d.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                    liveChart.data.datasets[0].data = reversed.map(d => d.temperature);
                    liveChart.data.datasets[1].data = reversed.map(d => d.humidity);
                    liveChart.update('none');
                }
            } catch (e) {
                console.error("Velesync Link Error", e);
            }
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
