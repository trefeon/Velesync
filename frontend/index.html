<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velesync | Neural IoT Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
    <style>
        :root {
            --bg: #0B0E14;
            --panel: rgba(255, 255, 255, 0.03);
            --panel-hover: rgba(255, 255, 255, 0.05);
            --accent: #2E5BFF;
            --accent-glow: rgba(46, 91, 255, 0.3);
            --text: #F8FAFC;
            --text-muted: #64748B;
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #06B6D4;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --radius: 1.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(46, 91, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
        }

        /* --- UI Components --- */
        .glass {
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .navbar {
            padding: clamp(1rem, 3vw, 1.5rem) clamp(1.5rem, 5vw, 4rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 14, 20, 0.85);
        }

        .logo {
            font-weight: 800;
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            max-width: 1400px;
            margin: clamp(1rem, 5vw, 3rem) auto;
            padding: 0 clamp(1rem, 3vw, 2rem);
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .container {
                grid-template-columns: 320px 1fr;
                align-items: start;
            }
        }

        /* --- Sidebar / Controls --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--panel-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn:active { transform: translateY(0); }

        .btn-primary { background: var(--accent); border: none; }
        .btn-primary:hover { background: #3B66FF; box-shadow: 0 8px 24px var(--accent-glow); }
        
        .btn-secondary { background: rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); border-color: var(--text-muted); }

        .btn-danger { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.1); }

        .btn.loading { opacity: 0.5; pointer-events: none; }

        /* --- Main Dashboard --- */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            padding: 1.75rem;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: var(--panel-hover);
            border-color: rgba(46, 91, 255, 0.3);
        }

        .label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
        }

        .value {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        /* --- Chart Section --- */
        .chart-box {
            padding: 2rem;
            height: 400px;
            position: relative;
        }

        /* --- Table Section --- */
        .activity-log {
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-container {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            background: rgba(0,0,0,0.2);
        }

        td {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            font-weight: 500;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* --- Terminal Feedback --- */
        .terminal {
            background: #000;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #0F0;
            height: 120px;
            overflow-y: auto;
            margin-top: auto;
            border: 1px solid #111;
        }

        .terminal span { color: #555; margin-right: 0.5rem; }

        /* --- Status Utilities --- */
        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-active { background: var(--success); box-shadow: 0 0 10px var(--success); }

        @media (max-width: 640px) {
            .navbar { padding: 1rem; }
            .container { margin-top: 1rem; gap: 1rem; }
            .stat-card { padding: 1.25rem; }
            .chart-box { height: 300px; padding: 1rem; }
            td, th { padding: 1rem 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Velesync</div>
        <div style="display:flex; gap: 1rem; align-items: center;">
            <button class="badge" onclick="toggleDemo()" id="demo-toggle" style="cursor:pointer; color: var(--cyan)">
                <span class="dot" style="background: var(--cyan)"></span>
                START DEMO MODE
            </button>
            <div class="badge">
                <span class="dot dot-active"></span>
                NETWORK STABLE
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="glass control-group">
                <div class="label">Neural Commands</div>
                <button class="btn btn-primary" id="btn-led_on" onclick="sendCommand('led_on', this)">💡 Light Pulse ON</button>
                <button class="btn btn-secondary" id="btn-led_off" onclick="sendCommand('led_off', this)">🌑 Pulse OFF</button>
                <button class="btn btn-danger" id="btn-restart" onclick="sendCommand('restart', this)">🔄 Force Reboot</button>
            </div>

            <div class="glass control-group">
                <div class="label">System Console</div>
                <div id="terminal" class="terminal">
                    <div><span>[system]</span> Link established.</div>
                </div>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="main-content">
            <div class="stats-grid">
                <div class="glass stat-card">
                    <div class="label">Thermal <span>LIVE</span></div>
                    <div class="value" id="temp-val">--<small>°C</small></div>
                </div>
                <div class="glass stat-card">
                    <div class="label">Atmospheric <span>AVG</span></div>
                    <div class="value" id="humi-val">--<small>%</small></div>
                </div>
                <div class="glass stat-card">
                    <div class="label">Luminosity <span>PEAK</span></div>
                    <div class="value" id="light-val">--<small>lx</small></div>
                </div>
            </div>

            <!-- Visualization -->
            <div class="glass chart-box">
                <div class="label">Neural Data Stream</div>
                <canvas id="liveChart"></canvas>
            </div>

            <!-- History Table -->
            <div class="glass activity-log">
                <div class="table-header">
                    <div class="label" style="margin:0">Recent Neural Activity</div>
                    <div class="badge" style="background:transparent">24H ARCHIVE</div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Device</th>
                                <th>Temp</th>
                                <th>Hum</th>
                                <th>Light</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        const DEFAULT_DEVICE = "velesync-node-01";

        // --- Chart Setup ---
        const ctx = document.getElementById('liveChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(46, 91, 255, 0.4)');
        gradient.addColorStop(1, 'rgba(46, 91, 255, 0)');

        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperature Core',
                    data: [],
                    borderColor: '#2E5BFF',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#475569' } },
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569' } }
                }
            }
        });

        // --- Core Logic ---
        function log(msg, type = 'system') {
            const term = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.innerHTML = `<span>[${type}]</span> ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function sendCommand(command, btn) {
            if (btn) btn.classList.add('loading');
            log(`Broadcasting: ${command}...`, 'cmd');
            
            try {
                const res = await fetch(`${API_BASE}/api/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: DEFAULT_DEVICE, command })
                });
                const data = await res.json();
                
                if (res.ok) {
                    log(`Success: Command ${command} acknowledged.`, 'ok');
                } else {
                    log(`Fail: ${data.detail || 'Access denied'}`, 'err');
                }
            } catch (e) {
                log(`Critical: Link to core severed.`, 'err');
            } finally {
                if (btn) btn.classList.remove('loading');
            }
        }

        let demoInterval = null;
        let demoMode = false;

        function toggleDemo() {
            demoMode = !demoMode;
            const btn = document.getElementById('demo-toggle');
            
            if (demoMode) {
                btn.innerHTML = '<span class="dot" style="background: var(--danger)"></span> STOP DEMO MODE';
                btn.style.color = 'var(--danger)';
                log("Neural Simulation Engine: ONLINE", "demo");
                startDemo();
            } else {
                btn.innerHTML = '<span class="dot" style="background: var(--cyan)"></span> START DEMO MODE';
                btn.style.color = 'var(--cyan)';
                log("Neural Simulation Engine: OFFLINE", "demo");
                clearInterval(demoInterval);
            }
        }

        function startDemo() {
            let baseT = 24;
            demoInterval = setInterval(() => {
                const mockData = Array.from({length: 15}, (_, i) => ({
                    timestamp: new Date(Date.now() - i * 5000).toISOString(),
                    device_id: "DEMO-NODE-V9",
                    temperature: (baseT + Math.sin(Date.now()/5000) * 2 + Math.random()).toFixed(1),
                    humidity: (45 + Math.cos(Date.now()/7000) * 5).toFixed(1),
                    light: Math.floor(400 + Math.random() * 200)
                }));
                renderData(mockData);
            }, 2000);
        }

        function renderData(data) {
            if (data.length > 0) {
                const latest = data[0];
                document.getElementById('temp-val').innerHTML = `${latest.temperature}<small>°C</small>`;
                document.getElementById('humi-val').innerHTML = `${latest.humidity}<small>%</small>`;
                document.getElementById('light-val').innerHTML = `${latest.light}<small>lx</small>`;

                // Update Table
                const body = document.getElementById('history-body');
                body.innerHTML = data.map(d => `
                    <tr>
                        <td>${new Date(d.timestamp).toLocaleTimeString()}</td>
                        <td>${d.device_id}</td>
                        <td style="color:var(--accent)">${d.temperature}°</td>
                        <td>${d.humidity}%</td>
                        <td style="color:var(--cyan)">${d.light} lx</td>
                    </tr>
                `).join('');

                // Update Chart
                const reversed = [...data].reverse();
                liveChart.data.labels = reversed.map(d => new Date(d.timestamp).toLocaleTimeString([], {minute:'2-digit', second:'2-digit'}));
                liveChart.data.datasets[0].data = reversed.map(d => d.temperature);
                liveChart.update('none');
            }
        }

        async function updateData() {
            if (demoMode) return; // Don't fetch if in demo mode
            try {
                const res = await fetch(`${API_BASE}/api/history?limit=15`);
                const data = await res.json();
                renderData(data);
            } catch (e) {
                // Silently fail if backend is down
            }
        }

        setInterval(updateData, 2000);
        updateData();
    </script>
</body>
</html>
